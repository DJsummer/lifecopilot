[pytest]
asyncio_mode = auto
testpaths = tests
addopts = -v --tb=short

markers =
    unit: 纯逻辑单元测试，不依赖 DB/外部服务
    integration: 集成测试，使用内存 DB
    e2e: 端到端 Selenium 测试，需要运行中的浏览器
    auth: 认证相关测试
    member: 成员管理相关测试
    health: 健康数据相关测试
    chat: RAG 问答相关测试
    lab_report: 检验单 AI 解读相关测试
    medication: 用药管理相关测试
    report: 健康周报/月报相关测试
    visit: 就医准备助手相关测试
    symptom: 症状日记 NLP 分析相关测试
    mental_health: 心理健康筛查相关测试
    skin: 皮肤/伤口照片分析相关测试
    nutrition: 个性化营养规划相关测试
    fitness: 运动方案生成与追踪相关测试
    alerts: 慢病趋势预测与告警相关测试
    sleep: 睡眠质量分析相关测试
    growth: 儿童生长发育评估相关测试

