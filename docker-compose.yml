# LifePilot — 生产环境 Docker Compose
# 用法: docker compose up -d

services:

  # ─────────────────────────────────────────────
  # API 服务 (FastAPI)
  # ─────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: lifepilot-api:latest
    container_name: lifepilot-api
    restart: unless-stopped
    env_file: .env
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    networks:
      - lifepilot-net
    labels:
      - "com.lifepilot.service=api"

  # ─────────────────────────────────────────────
  # PostgreSQL — 结构化数据（用户/成员/用药）
  # ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: lifepilot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lifepilot}
      POSTGRES_USER: ${POSTGRES_USER:-lifepilot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lifepilot}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lifepilot-net

  # ─────────────────────────────────────────────
  # InfluxDB — 时序健康数据（血压/血糖/心率）
  # ─────────────────────────────────────────────
  influxdb:
    image: influxdb:2.7-alpine
    container_name: lifepilot-influxdb
    restart: unless-stopped
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUX_USER:-admin}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUX_PASSWORD}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUX_ORG:-lifepilot}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUX_BUCKET:-health_metrics}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUX_TOKEN}
    volumes:
      - influxdb-data:/var/lib/influxdb2
      - influxdb-config:/etc/influxdb2
    ports:
      - "${INFLUX_PORT:-8086}:8086"
    networks:
      - lifepilot-net

  # ─────────────────────────────────────────────
  # Qdrant — 向量数据库（RAG 知识库）
  # ─────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: lifepilot-qdrant
    restart: unless-stopped
    volumes:
      - qdrant-data:/qdrant/storage
      - ./docker/qdrant/config.yaml:/qdrant/config/production.yaml:ro
    ports:
      - "${QDRANT_PORT:-6333}:6333"
      - "6334:6334"  # gRPC
    networks:
      - lifepilot-net

  # ─────────────────────────────────────────────
  # Redis — 缓存 / 会话 / 消息队列
  # ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: lifepilot-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis-data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lifepilot-net

  # ─────────────────────────────────────────────
  # Celery Worker — 异步任务（报告生成/推送通知）
  # ─────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: lifepilot-api:latest
    container_name: lifepilot-worker
    restart: unless-stopped
    env_file: .env
    command: celery -A src.workers.celery_app worker --loglevel=info --concurrency=2
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - lifepilot-net

  # ─────────────────────────────────────────────
  # Nginx — 反向代理
  # ─────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: lifepilot-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
    networks:
      - lifepilot-net

volumes:
  postgres-data:
  influxdb-data:
  influxdb-config:
  qdrant-data:
  redis-data:

networks:
  lifepilot-net:
    driver: bridge
